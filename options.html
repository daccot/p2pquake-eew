<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>P2P地震情報アラート 設定</title>
  <style>
    body{margin:0;min-width:520px;background:#0f172a;color:#f8fafc;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Yu Gothic",Meiryo,sans-serif}
    main{max-width:860px;margin:0 auto;padding:28px}
    h1{margin:0 0 8px;font-size:24px}
    p{color:#cbd5e1;line-height:1.7}
    .panel{margin-top:20px;padding:20px;background:#111827;border:1px solid rgba(255,255,255,.14);border-radius:16px}
    .field{padding:16px 0;border-bottom:1px solid rgba(255,255,255,.14)}
    .field:last-child{border-bottom:0}
    label{font-weight:800}
    .row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .hint{margin-top:8px;color:#cbd5e1;font-size:13px}
    select,input[type=number],input[type=text]{margin-top:8px;width:260px;max-width:100%;padding:10px 12px;color:#f8fafc;background:#020617;border:1px solid rgba(255,255,255,.18);border-radius:10px;font-size:14px}
    input.small{width:160px}
    .buttons{display:flex;gap:12px;flex-wrap:wrap;margin-top:20px}
    button{border:0;border-radius:999px;padding:11px 18px;color:#020617;background:#38bdf8;font-weight:900;cursor:pointer}
    button.secondary{color:#f8fafc;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18)}
    button.danger{color:#fff;background:#dc2626}
    #status{margin-top:14px;min-height:22px;color:#cbd5e1;font-size:13px}
    .error{color:#f87171}
    .history{margin-top:14px;display:grid;gap:8px}
    .history-item{padding:10px 12px;border:1px solid rgba(255,255,255,.12);border-radius:12px;background:rgba(255,255,255,.06);font-size:13px;line-height:1.5}
  </style>
</head>
<body>
  <main>
    <h1>P2P地震情報アラート 設定</h1>
    <p>EEWカウントダウン、アイコン点滅、バッジ通知に対応した完成版です。</p>

    <section class="panel">
      <div class="field"><div class="row"><input type="checkbox" id="enableEarthquake"><label for="enableEarthquake">通常地震情報を表示する</label></div><div class="hint">code 551 を対象にします。</div></div>
      <div class="field"><div class="row"><input type="checkbox" id="enableEew"><label for="enableEew">緊急地震速報を表示する</label></div><div class="hint">code 554 / 556 を対象にします。</div></div>
      <div class="field"><div class="row"><input type="checkbox" id="enableSound"><label for="enableSound">警告音を鳴らす</label></div></div>

      <div class="field">
        <label for="minScale">通常地震情報の通知閾値</label><br>
        <select id="minScale"><option value="30">震度3以上</option><option value="40">震度4以上</option></select>
      </div>

      <div class="field">
        <label for="notifyScope">通知対象</label><br>
        <select id="notifyScope"><option value="all">すべての通常Webページ</option><option value="active">現在アクティブなタブのみ</option></select>
      </div>

      <div class="field">
        <label for="autoCloseSeconds">自動クローズ秒数</label><br>
        <input type="number" id="autoCloseSeconds" min="0" max="120" step="1">
        <div class="hint">0 の場合は自動で閉じません。EEWは最低20秒表示します。</div>
      </div>

      <div class="field">
        <label for="regionFilter">地域フィルタ</label><br>
        <input type="text" id="regionFilter" placeholder="例: 東京都,神奈川県">
        <div class="hint">空欄なら全地域。カンマ区切りで都道府県・地域名を指定できます。</div>
      </div>

      <div class="field">
        <label>EEW到達予測用の地点</label><br>
        <input type="text" id="userLocationName" placeholder="例: 東京駅">
        <div class="row">
          <input class="small" type="number" id="userLatitude" step="0.000001" placeholder="緯度">
          <input class="small" type="number" id="userLongitude" step="0.000001" placeholder="経度">
        </div>
        <div class="hint">既定値は東京駅付近です。自社拠点や自宅の緯度経度に変えると到達予測が実用的になります。</div>
      </div>

      <div class="buttons">
        <button type="button" id="saveButton">保存</button>
        <button type="button" id="testButton" class="secondary">通常通知テスト</button>
        <button type="button" id="testEewButton" class="danger">EEWカウントダウンテスト</button>
        <button type="button" id="reconnectButton" class="secondary">WebSocket再接続</button>
      </div>

      <div class="buttons">
        <button type="button" id="mute10Button" class="secondary">10分ミュート</button>
        <button type="button" id="mute60Button" class="secondary">1時間ミュート</button>
        <button type="button" id="unmuteButton" class="secondary">ミュート解除</button>
      </div>

      <div id="status" role="status"></div>
    </section>

    <section class="panel">
      <h2>通知履歴</h2>
      <div class="buttons"><button type="button" id="reloadHistoryButton" class="secondary">履歴更新</button><button type="button" id="clearHistoryButton" class="secondary">履歴削除</button></div>
      <div id="history" class="history"></div>
    </section>
  </main>
  <script src="options.js"></script>
</body>
</html>
